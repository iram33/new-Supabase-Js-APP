version: '3.8'

services:
  # Supabase Database (PostgreSQL)
  db:
    image: supabase/postgres:15.1.0.117
    container_name: supabase-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: supabase_admin
      POSTGRES_PASSWORD: your-super-secret-password-for-supabase-db
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: pg_isready -U supabase_admin -d postgres
      interval: 5s
      timeout: 5s
      retries: 10

  # Supabase Auth
  auth:
    image: supabase/gotrue:v2.91.0
    container_name: supabase-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://supabase_admin:your-super-secret-password-for-supabase-db@db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: false
      GOTRUE_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
      GOTRUE_MAILER_AUTOCONFIRM: true
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
    ports:
      - "9999:9999"
    healthcheck:
      test: curl -f http://localhost:9999/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  # Supabase REST API
  rest:
    image: supabase/postgrest:v12.0.1
    container_name: supabase-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://supabase_admin:your-super-secret-password-for-supabase-db@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_SEARCH_PATH: public
      PGRST_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: 3000
      PGRST_MAX_ROWS: 1000
      PGRST_DEFAULT_ROWS: 20
    ports:
      - "3000:3000"
    healthcheck:
      test: curl -f http://localhost:3000/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  # Supabase Storage
  storage:
    image: supabase/storage-api:v0.48.0
    container_name: supabase-storage
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_healthy
    environment:
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EaIMWDU452oP1ORhkP4Ipt5osk8d9y2yqEIthBkGn3M
      POSTGREST_URL: http://rest:3000
      PGOPTIONS: "-c search_path=public"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    volumes:
      - ./volumes/storage/data:/var/lib/storage
    ports:
      - "5000:5000"
    healthcheck:
      test: curl -f http://localhost:5000/status || exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  # Supabase Realtime
  realtime:
    image: supabase/realtime:v2.26.0
    container_name: supabase-realtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: your-super-secret-password-for-supabase-db
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO public, storage'
      DB_ENC_KEY: supabaserealtime#supersecret
      API_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      FLY_ALLOC_ID: abc123
      FLY_APP_NAME: supabase-realtime
      FLY_REGION: iad
      SECRET_KEY_BASE: UpNVntn3cDxHJ24GgmlmIVXuaEkNoYbNDpi6xDm4X7I=
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES_QUERY: ""
    ports:
      - "4000:4000"
    healthcheck:
      test: curl -f http://localhost:4000/api/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  # Todo App Backend
  todo-backend:
    build: .
    container_name: todo-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      SUPABASE_URL: http://rest:3000
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EaIMWDU452oP1ORhkP4Ipt5osk8d9y2yqEIthBkGn3M
    ports:
      - "3001:3001"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: curl -f http://localhost:3001/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optional - for serving frontend)
  nginx:
    image: nginx:alpine
    container_name: todo-nginx
    restart: unless-stopped
    depends_on:
      - todo-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./frontend:/usr/share/nginx/html:ro
    healthcheck:
      test: curl -f http://localhost/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
    driver: local
  storage_data:
    driver: local

networks:
  default:
    name: supabase_network
