version: '3.8'

services:
  # Supabase Studio (Dashboard)
  studio:
    image: supabase/studio:20240311-4bcf78e
    container_name: supabase-studio
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_healthy
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EaIMWDU452oP1ORhkP4Ipt5osk8d9y2yqEIthBkGn3M
    ports:
      - "54323:3000"
    healthcheck:
      test: curl -f http://localhost:3000/api/profile || exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  # Supabase Database (PostgreSQL)
  db:
    image: supabase/postgres:15.1.0.117
    container_name: supabase-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=warning
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
      - ./supabase/config.toml:/etc/supabase/config.toml:ro
    ports:
      - "54322:5432"
    healthcheck:
      test: pg_isready -U postgres -d postgres
      interval: 5s
      timeout: 5s
      retries: 10

  # Kong API Gateway
  kong:
    image: kong:3.4
    container_name: supabase-kong
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
    volumes:
      - ./volumes/kong:/kong/declarative
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    healthcheck:
      test: kong health
      interval: 5s
      timeout: 5s
      retries: 10

  # Supabase Auth
  auth:
    image: supabase/gotrue:v2.91.0
    container_name: supabase-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: false
      GOTRUE_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
      GOTRUE_MAILER_AUTOCONFIRM: true
    healthcheck:
      test: curl -f http://localhost:9999/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  # Supabase REST API (PostgREST)
  rest:
    image: supabase/postgrest:v12.0.1
    container_name: supabase-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://postgres:postgres@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_SEARCH_PATH: public
      PGRST_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: 3000
      PGRST_MAX_ROWS: 1000
      PGRST_DEFAULT_ROWS: 20
    healthcheck:
      test: curl -f http://localhost:3000/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  # Supabase Storage
  storage:
    image: supabase/storage-api:v0.48.0
    container_name: supabase-storage
    restart: unless-stopped
    depends_on:
      rest:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EaIMWDU452oP1ORhkP4Ipt5osk8d9y2yqEIthBkGn3M
      POSTGREST_URL: http://rest:3000
      PGOPTIONS: "-c search_path=public"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    volumes:
      - ./volumes/storage/data:/var/lib/storage
    healthcheck:
      test: curl -f http://localhost:5000/status || exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  # Supabase Realtime
  realtime:
    image: supabase/realtime:v2.26.0
    container_name: supabase-realtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO public, storage'
      DB_ENC_KEY: supabaserealtime#supersecret
      API_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      FLY_ALLOC_ID: abc123
      FLY_APP_NAME: supabase-realtime
      FLY_REGION: iad
      SECRET_KEY_BASE: UpNVntn3cDxHJ24GgmlmIVXuaEkNoYbNDpi6xDm4X7I=
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES_QUERY: ""
    healthcheck:
      test: curl -f http://localhost:4000/api/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  # Database Migrations
  migrations:
    image: supabase/cli:v1.166.0
    container_name: supabase-migrations
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        supabase db reset --linked
        supabase db push
    environment:
      SUPABASE_DB_HOST: db
      SUPABASE_DB_PASSWORD: postgres
      SUPABASE_DB_USER: postgres
      SUPABASE_DB_PORT: 5432
      SUPABASE_DB_NAME: postgres
      SUPABASE_DB_URL: postgresql://postgres:postgres@db:5432/postgres
    volumes:
      - ./supabase/migrations:/supabase/migrations
      - ./supabase/seed.sql:/supabase/seed.sql

volumes:
  db_data:
    driver: local
  storage_data:
    driver: local
  kong_data:
    driver: local

networks:
  default:
    name: supabase_local
